
<!DOCTYPE html>
<html lang="en" data-theme="green">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>About • VaultSoft Terminal</title>
  <link rel="stylesheet" href="./assets/css/base.css"/>
</head>
<body data-init="about">
  <header id="header"></header>
  <main class="container">
    <div class="card"><div id="about-panel"></div></div>
  </main>
  <footer id="footer"></footer>
  <script type="module">
    import { mdToHtml } from './assets/js/markdown.js';
    (async()=>{const res=await fetch('./content/about.md');const md=await res.text();document.getElementById('about-panel').innerHTML=mdToHtml(md);})();
  </script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>

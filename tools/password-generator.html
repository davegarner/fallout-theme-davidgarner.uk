
<!DOCTYPE html>
<html lang="en" data-theme="green">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Password Generator • Tools</title>
  <link rel="stylesheet" href="../assets/css/base.css"/>
</head>
<body data-init="password">
  <header id="header"></header>
  <main class="container">
<div class="card">
  <form id="pw-form" class="list">
    <div><label for="username">Username</label><input id="username" type="text" placeholder="overseer" required /></div>
    <div><label for="website">Website</label><input id="website" type="text" placeholder="vaultsoft.local" required /></div>
    <div><label for="pw-output">Password</label><input id="pw-output" type="text" readonly placeholder="xxxxxx-xxxxxx-xxxxxx" /></div>
    <div style="display:flex;gap:.5rem;"><button id="btn-generate">Generate</button><button id="btn-download">Download CSV</button></div>
    <p style="opacity:.85;margin:0;">Format: 3 blocks of 6 unique lowercase letters separated by <code>-</code>. Two characters are mutated (one digit, one uppercase).</p>
  </form>
</div>
</main>
  <footer id="footer"></footer>
  <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
